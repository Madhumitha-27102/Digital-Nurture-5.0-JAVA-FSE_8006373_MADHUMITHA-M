<h1>Reactive Student Enrollment Form</h1>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <!-- Student Name -->
  <div>

    <label>Student Name:</label><br>

    <input type="text" formControlName="studentName">

    <div *ngIf="enrollForm.get('studentName')?.touched">

      <small *ngIf="enrollForm.get('studentName')?.errors?.['required']">
        Name is required
      </small>

      <small *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">
        Name must be at least 3 characters
      </small>

    </div>

  </div>

  <br>

  <!-- Email -->

  <div>

    <label>Student Email:</label><br>

    <input
      type="email"
      formControlName="studentEmail">

    <div *ngIf="enrollForm.get('studentEmail')?.touched">

      <small *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">
        Email is required
      </small>

      <small *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">
        Enter a valid email
      </small>

      <small *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
        Email is already taken.
      </small>

      <small *ngIf="enrollForm.get('studentEmail')?.pending">
        Checking email...
      </small>

    </div>

  </div>

  <br>

  <!-- Course ID -->

  <div>

    <label>Course ID:</label><br>

    <input
      type="text"
      formControlName="courseId">

    <div *ngIf="enrollForm.get('courseId')?.touched">

      <small *ngIf="enrollForm.get('courseId')?.errors?.['required']">
        Course ID is required
      </small>

      <small *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
        Course code starting with XX is not allowed.
      </small>

    </div>

  </div>

  <br>

  <!-- Semester -->

  <div>

    <label>Preferred Semester:</label><br>

    <select formControlName="preferredSemester">

      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

    </select>

  </div>

  <br>

  <!-- Terms -->

  <div>

    <label>

      <input
        type="checkbox"
        formControlName="agreeToTerms">

      I agree to the Terms and Conditions

    </label>

  </div>

  <br>

  <!-- FormArray -->

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">

    Add Another Course

  </button>

  <br><br>

  <div formArrayName="additionalCourses">

    <div *ngFor="let ctrl of additionalCourses.controls; let i = index">

      <input
        [formControl]="ctrl"
        placeholder="Course Name">

      <button
        type="button"
        (click)="removeCourse(i)">

        Remove

      </button>

    </div>

  </div>

  <br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>

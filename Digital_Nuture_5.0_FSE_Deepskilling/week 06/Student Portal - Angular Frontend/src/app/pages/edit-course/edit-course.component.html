<h2>Edit Course</h2>

<form #courseForm="ngForm" (ngSubmit)="onSubmit(courseForm)">

  <p>
    <label>Course Name</label><br>
    <input
      type="text"
      name="name"
      [(ngModel)]="name"
      required>
  </p>

  <p>
    <label>Course Code</label><br>
    <input
      type="text"
      name="code"
      [(ngModel)]="code"
      required>
  </p>

  <p>
    <label>Credits</label><br>
    <input
      type="number"
      name="credits"
      [(ngModel)]="credits"
      required>
  </p>

  <p>

    <label>Grade Status</label><br>

    <select
      name="gradeStatus"
      [(ngModel)]="gradeStatus">

      <option value="passed">Passed</option>
      <option value="failed">Failed</option>
      <option value="pending">Pending</option>

    </select>

  </p>

  <p>

    <label>

      <input
        type="checkbox"
        name="enrolled"
        [(ngModel)]="enrolled">

      Enrolled

    </label>

  </p>

  <button type="submit">

    Update Course

  </button>

</form>
